version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: collection_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collection_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: collection_redis
    ports:
      - '6379:6379'

  # Temporal setup
  cassandra:
    image: cassandra:4.0
    container_name: collection_cassandra
    ports:
      - "9042:9042"

  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: collection_temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=admin
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    depends_on:
      - postgres

  temporal-ui:
    image: temporalio/ui:2.20.0
    container_name: collection_temporal_ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

volumes:
  postgres_data:
